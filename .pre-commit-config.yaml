exclude: ^schemas/table-schema.json$
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: trailing-whitespace
      - id: end-of-file-fixer
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.37.0
    hooks:
      - id: check-dependabot
      - id: check-github-actions
      - id: check-github-workflows
      - id: check-metaschema
        name: Validate JSON schemas
        files: ^schemas/(settings|input/model|output/metadata)\.yaml$
      - id: check-jsonschema
        name: Validate table schemas
        args: ["--schemafile", "schemas/table-schema.json"]
        files: ^schemas/input/
        exclude: /model\.yaml$
      - id: check-jsonschema
        name: Validate model.toml files
        args: ["--schemafile", "schemas/input/model.yaml"]
        files: /model\.toml$
        types_or: [toml]
      - id: check-jsonschema
        name: Validate settings.toml files
        args: ["--schemafile", "schemas/settings.yaml"]
        files: /settings\.toml$
        types_or: [toml]
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint-fix
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: "v4.0.0-alpha.8"
    hooks:
      - id: prettier
        types_or: [yaml, json]
  - repo: https://github.com/macisamuele/language-formatters-pre-commit-hooks
    rev: v2.16.0
    hooks:
      - id: pretty-format-toml
        args: [--autofix, --indent, "4", --no-sort]
        exclude: ^Cargo\.lock$
      - id: pretty-format-rust
        args: [--autofix]
  - repo: https://github.com/doublify/pre-commit-rust
    rev: v1.0
    hooks:
      - id: clippy
        args: ["--all-targets", "--", "-D", "warnings"]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff-check
        types_or: [python]
        args: [--fix]
      - id: ruff-format
        types_or: [python]
  - repo: https://github.com/kynan/nbstripout
    rev: 0.9.1
    hooks:
      - id: nbstripout
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        args: [--ignore-words, .codespell_ignore.txt]
        exclude: \.svg$
  - repo: https://github.com/EnergySystemsModellingLab/cffconvert
    rev: 2.1.0
    hooks:
      - id: validate-cff
