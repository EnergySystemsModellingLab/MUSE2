# Update Cargo dependencies
# https://github.com/peter-evans/create-pull-request/blob/main/docs/examples.md#update-cargo-dependencies

name: Update Cargo.lock

on:
  schedule:
    # Dependabot visits on Weds, so run on Thurs
    - cron: "0 0 * * 4"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  cargo-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Update dependencies
        run: cargo update

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GH_TOKEN_FOR_UPDATES }}
          branch: update/cargo-lock
          commit-message: "chore: update Cargo.lock"
          title: Update Cargo.lock
          body: |
            Update dependencies to latest versions.

            Auto-generated by [create-pull-request][1]

            [1]: https://github.com/peter-evans/create-pull-request
